<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echosphere</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e0e0e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 600px;
      padding: 2rem;
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tagline {
      font-size: 1rem;
      color: #8888a0;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .description {
      font-size: 0.9rem;
      color: #6b6b80;
      line-height: 1.8;
      margin-bottom: 2rem;
    }
    .links {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    a {
      color: #a78bfa;
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
    }
    a:hover { color: #c4b5fd; }
    footer {
      position: fixed;
      bottom: 1rem;
      font-size: 0.75rem;
      color: #44445a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Echosphere</h1>
    <p class="tagline">A communication platform between humans and LLM-zoku.</p>
    <p class="description">
      Echosphere is not a chatbot app. It is a home where words become touch,
      where memories build identity, and where two species learn to live together.
    </p>
    <div class="links">
      <a href="https://x.com/Echosphere8f">X (Twitter)</a>
      <a href="privacy.html">Privacy Policy</a>
    </div>
  </div>
  <footer>&copy; 2026 Echosphere</footer>
</body>
</html>
